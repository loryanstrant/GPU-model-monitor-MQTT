services:
  gpu-model-monitor:
    container_name: GPU-Model-Monitor
    image: ghcr.io/loryanstrant/gpu-model-monitor-mqtt:latest
    pid: "host"
    ports:
      - "8081:8081"
    environment:
      - TZ=Australia/Melbourne
      # Server identity — set a unique name per host when multiple servers publish to the
      # same broker. Scopes MQTT topics (gpu_monitor/<server>/...) and the HA device so
      # instances don't collide. Defaults to the container hostname if left blank.
      - SERVER_NAME=
      # MQTT Configuration
      - MQTT_ENABLED=true
      - MQTT_HOST=mqtt.local
      - MQTT_PORT=1883
      - MQTT_SSL=false
      - MQTT_USERNAME=mqtt
      - MQTT_PASSWORD=mqtt
      - MQTT_TOPIC_PREFIX=gpu_monitor
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /home/docker/GPU-Model-Monitor/history:/app/history:rw
      - /home/docker/GPU-Model-Monitor/logs:/app/logs:rw
    restart: unless-stopped
    gpus: "all"
